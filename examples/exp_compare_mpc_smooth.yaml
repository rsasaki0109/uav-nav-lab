# Plain MPC with the action-jump cost cranked up — the architectural fix
# pointed at by PR #21/#22's null result, applied to the planner that
# already has the right knob.
#
# PR #21 found mpc_chomp's pure-pursuit on smoothed waypoints raises
# |Δcmd| 90 % over plain MPC. PR #22 added a velocity-profile follower
# and found it 6.3× worse. Both null results converged on a hypothesis:
# the load-bearing factor for plain MPC's good smoothness is the
# w_smooth · |action - prev_action| term in its scoring, and the right
# fix is to *tune the existing knob*, not add new layers.
#
# Default w_smooth = 0.05 in `SamplingMPCPlanner` is under-tuned for the
# predictive scenario. Sweeping w_smooth ∈ {0.05, 0.5, 5.0, 50.0} on the
# same Pareto config (50×50, n=30 episodes, dynamic obstacles, Wilson 95 % CI):
#
#   w_smooth=0.05    96.7 % [83, 99]   |Δcmd| 0.320   (default — exp_compare_mpc.yaml)
#   w_smooth=0.5    100.0 % [89, 100]  |Δcmd| 0.244   ← this YAML — strict sweet spot
#   w_smooth=5.0     96.7 % [83, 99]   |Δcmd| 0.245
#   w_smooth=50.0    83.3 % [66, 93]   |Δcmd| 0.183
#
# w_smooth=0.5 wins on *both* axes simultaneously: success rate +3.3 pp
# (96.7 % → 100 %) AND |Δcmd| -24 % (0.32 → 0.24). Cranking past 0.5
# trades success for further smoothness — w_smooth=50 reaches the
# smoothest control trajectory but the planner refuses obstacle
# maneuvers (16.7 % collision rate).
#
# Architectural insight from PR #21/#22's null result is *confirmed* for
# plain MPC, and the fix is one line of YAML. The mpc_chomp wrapper
# remains a wash because it operates downstream of where the cost lives;
# see exp_compare_mpc_chomp_vprofile.yaml's header for the full
# decomposition (CHOMP-side w_action_jump made vprofile mode *worse*,
# not better — the fix doesn't transfer to the smoothing layer).
#
# Methodological note: this is the third PR in a sequence (mpc_chomp →
# velocity-profile follower → w_smooth tuning) that re-validated the
# architectural claim each time before declaring it sound. The
# load-bearing factor was identified by *building the proposed fix* and
# testing it — what looked like a wash for the wrapper turned out to be
# a clean win for the right knob on the right planner.
#
# Reproduce (single config):
#   uav-nav run examples/exp_compare_mpc_smooth.yaml
#   uav-nav eval results/cmp_mpc_smooth
# Reproduce (full sweep):
#   uav-nav sweep examples/exp_compare_mpc.yaml \
#     --param planner.w_smooth=0.05,0.5,5.0,50.0
name: cmp_mpc_smooth
seed: 42
num_episodes: 30

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 25
    seed: 7
  dynamic_obstacles:
    - start: [25.0, 10.0]
      velocity: [0.0, 6.0]
      reflect: true
      radius: 0.8
    - start: [10.0, 30.0]
      velocity: [5.0, 0.0]
      reflect: true
      radius: 0.8
    - start: [35.0, 25.0]
      velocity: [-4.0, 3.0]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 10.0
  replan_period: 0.2
  horizon: 20
  dt_plan: 0.05
  n_samples: 16
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  # 10× the default — the architectural-fix sweet spot identified in the
  # PR #21/#22 follow-up sweep above.
  w_smooth: 0.5

sensor:
  type: perfect

output:
  dir: results/cmp_mpc_smooth

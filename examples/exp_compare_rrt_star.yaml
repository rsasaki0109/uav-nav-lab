# Planner head-to-head — RRT* (continuous-space sampling with rewiring)
# on the predictive (dynamic-obstacle) scenario. Same layout as
# exp_compare_{straight,astar,rrt,mpc}; RRT* extends RRT with neighborhood
# rewiring for asymptotic optimality.
# See exp_compare_astar.yaml for the full comparison table and discussion.
name: cmp_rrt_star
seed: 42
num_episodes: 30

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 25
    seed: 7
  dynamic_obstacles:
    - start: [25.0, 10.0]
      velocity: [0.0, 6.0]
      reflect: true
      radius: 0.8
    - start: [10.0, 30.0]
      velocity: [5.0, 0.0]
      reflect: true
      radius: 0.8
    - start: [35.0, 25.0]
      velocity: [-4.0, 3.0]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: rrt_star
  max_speed: 10.0
  replan_period: 0.2
  step_size: 2.0
  rewire_radius: 4.0
  goal_tolerance: 1.5
  goal_bias: 0.1
  max_samples: 1000
  resolution: 1.0
  inflate: 1
  seed: 42

sensor:
  type: perfect

output:
  dir: results/cmp_rrt_star

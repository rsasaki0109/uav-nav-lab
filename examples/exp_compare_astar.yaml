# Planner head-to-head — A* on the predictive (dynamic-obstacle) scenario.
#
# Shared with exp_compare_straight.yaml and exp_compare_mpc.yaml: same
# 50×50 grid, same 25 random static obstacles, same three bouncing
# dynamic obstacles, same perfect sensor — only `planner.type` and the
# planner-specific block differ. Compares apples-to-apples whether each
# planner can clear a moderately cluttered dynamic world.
#
# Validated comparison (n=30 episodes, Wilson 95% CIs, perfect sensor):
#
#   planner    succ%   ±     coll%   ±     plan_ms mean / p95
#   straight     0.0   5.7   100.0   5.7    0.04 /  0.05    ← baseline floor
#   astar       20.0  13.9    80.0  13.9    4.75 /  8.97    ← snapshot-only grid
#   rrt         73.3  15.1    26.7  15.1   29.99 / 64.27    ← snapshot-only continuous
#   mpc        100.0   5.7     0.0   5.7   52.16 / 56.96    ← Pareto config
#
# Findings:
#  - MPC at the Pareto config (n_samples=16, horizon=20) **clears every
#    episode**. Its constant-velocity peer prediction lets it route around
#    the bouncing obstacles' *future* positions, while A* sees only a
#    snapshot at replan time and walks into where they'll be 0.2 s later.
#  - **RRT (continuous-space sampling) beats grid A* by +53 pp** at
#    similar plan_dt order of magnitude. Both planners are snapshot-only
#    (no motion prediction), so the gap is entirely about path geometry:
#    RRT's continuous edges traverse open space in straight lines,
#    arriving past obstacle crossings before they happen. A*'s
#    8-connected grid path zigzags, sitting in obstacle paths longer.
#  - The full ladder reads as:
#      no reasoning   < grid reasoning < continuous reasoning < model-based
#       (straight 0%)  (astar 20%)      (rrt 73%)              (mpc 100%)
#  - A* at 20 % vs MPC at 100 % isolates the value of motion prediction
#    plus continuous-space planning combined; A* vs RRT (20 → 73 %)
#    isolates continuous-space planning alone; RRT vs MPC (73 → 100 %)
#    isolates motion prediction at fixed-search-strategy.
#  - Compute cost: MPC is ~11× per-replan over A* (52 ms vs 4.8 ms) and
#    ~1300× over straight-line; RRT sits between (30 ms mean, 64 ms p95).
#    With ~5 Hz replanning that's a real budget — for an embedded payload
#    with sub-ms requirements, A*'s 20 % may still beat MPC's 100 % at
#    higher speeds where MPC's 56 ms p95 stops fitting in the replan
#    period.
#
# Reproduce with:
#   uav-nav run examples/exp_compare_astar.yaml
#   uav-nav run examples/exp_compare_straight.yaml
#   uav-nav run examples/exp_compare_rrt.yaml
#   uav-nav run examples/exp_compare_mpc.yaml
#   uav-nav compare results/cmp_straight results/cmp_astar results/cmp_rrt results/cmp_mpc
name: cmp_astar
seed: 42
num_episodes: 30

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 25
    seed: 7
  dynamic_obstacles:
    - start: [25.0, 10.0]
      velocity: [0.0, 6.0]
      reflect: true
      radius: 0.8
    - start: [10.0, 30.0]
      velocity: [5.0, 0.0]
      reflect: true
      radius: 0.8
    - start: [35.0, 25.0]
      velocity: [-4.0, 3.0]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: astar
  max_speed: 10.0
  replan_period: 0.2
  resolution: 1.0
  inflate: 1

sensor:
  type: perfect

output:
  dir: results/cmp_astar

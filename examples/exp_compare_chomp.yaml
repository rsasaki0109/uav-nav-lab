# Planner head-to-head — CHOMP (gradient-based trajectory smoothing) on the
# predictive scenario. Same layout as exp_compare_{straight,astar,rrt,rrt_star,mpc}
# so results stack into the README's planner table.
#
# CHOMP optimises a fixed-length sequence of waypoints from a straight-line
# init by descending a smoothness + obstacle potential under M⁻¹-preconditioned
# steps (see uav_nav_lab/planner/chomp.py for the math). Pair with a short
# replan_period so the optimiser gets a fresh init each cycle — that is the
# closest analogue CHOMP has to RRT's probabilistic completeness.
#
# Expectation vs the rest of the table (50×50, n=30 episodes, dynamic obstacles):
#   straight     0 %       (no avoidance)
#   astar       20 %       (grid-snap + replan-stale problem)
#   rrt*        23 %       (asymptotic optimality < freshness)
#   rrt         73 %       (continuous-space sampling, dynamic-obstacle robust)
#   mpc        100 %       (motion-prediction rollouts)
# CHOMP is a *local* method — when straight-line init crosses an obstacle it
# can detour but cannot tunnel through, and dynamic obstacles in the path can
# trap the optimiser between two passing obstacles. Reading: somewhere
# between astar and rrt; the value is smoother paths, not a higher success
# rate.
#
# Reproduce: uav-nav run examples/exp_compare_chomp.yaml
name: cmp_chomp
seed: 42
num_episodes: 30

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 25
    seed: 7
  dynamic_obstacles:
    - start: [25.0, 10.0]
      velocity: [0.0, 6.0]
      reflect: true
      radius: 0.8
    - start: [10.0, 30.0]
      velocity: [5.0, 0.0]
      reflect: true
      radius: 0.8
    - start: [35.0, 25.0]
      velocity: [-4.0, 3.0]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: chomp
  max_speed: 10.0
  replan_period: 0.2
  n_waypoints: 30
  n_iters: 100
  learning_rate: 0.05
  max_step_norm: 1.0
  w_smooth: 1.0
  w_obs: 5.0
  epsilon: 2.0
  resolution: 1.0
  inflate: 1
  goal_tolerance: 1.5

sensor:
  type: perfect

output:
  dir: results/cmp_chomp

# Two drones flying toward each other through a sparse static field.
# Each plans independently with MPC and observes the other as a moving
# obstacle through the configured sensor.
#
# Validated ablation (n=30 episodes, joint success with Wilson 95% CI):
#   use_prediction=true  → joint success 86.7% [70.3, 94.7]
#   use_prediction=false → joint success 30.0% [16.7, 47.9]
# Non-overlapping CIs confirm peer prediction is essential here.
#
# Re-run with:
#   uav-nav sweep examples/exp_multi_drone.yaml \
#     --param planner.use_prediction=true,false \
#     --param num_episodes=30 -j 2
#
# Other ablation knobs:
#   --param planner.predictor.type=noisy_velocity
#   --param planner.predictor.velocity_noise_std=0.0,0.5,1.0,2.0,4.0
#       Peer-tracking quality vs. joint mid-air success (n=30):
#         σ=0.0 → 86.7%   σ=2.0 → 83.3%
#         σ=0.5 → 80.0%   σ=4.0 → 73.3%
#         σ=1.0 → 76.7%
#       Roughly monotonic decrease (-13pp from σ=0 to σ=4); CIs overlap
#       at n=30 so individual pair comparisons are not yet significant.
name: multi_drone_headon
seed: 42
num_episodes: 5

scenario:
  type: multi_drone_grid
  size: [60, 30]
  resolution: 1.0
  obstacles:
    type: random
    count: 20
    seed: 7
  drones:
    - name: alice
      start: [3.0, 15.0]
      goal: [55.0, 15.0]
      radius: 0.4
    - name: bob
      start: [55.0, 15.0]
      goal: [3.0, 15.0]
      radius: 0.4

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 7.0
  replan_period: 0.2
  horizon: 60
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.6
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/multi_drone_headon

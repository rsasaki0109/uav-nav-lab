# AirSim bridge — runs the framework's experiment runner against a real
# AirSim server (Microsoft AirSim / Colosseum). Not exercised in CI.
#
# Setup:
#   pip install airsim                                    # client lib
#   ./AirSim/Blocks/LinuxNoEditor/Blocks.sh -windowed     # or any AirSim env
#
# Run:
#   uav-nav run examples/exp_airsim.yaml
#
# Notes:
#  - The scenario block stays the same as the 2D dummy world; the planner
#    sees its occupancy as the source of truth, while AirSim provides the
#    physical ego state and collision flag.
#  - The bridge converts ENU (framework) ↔ NED (AirSim) on every step.
#  - simPause + simContinueForTime is used to fast-forward AirSim per
#    `dt`, decoupling the runner's loop from real-time wall clock.
name: airsim_baseline
seed: 42
num_episodes: 3

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [40.0, 40.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 30
    seed: 7

simulator:
  type: airsim
  host: 127.0.0.1
  port: 41451
  vehicle: Drone1
  dt: 0.05
  max_steps: 1500
  goal_radius: 1.5
  # lidars: list of LiDAR sensor names configured on the AirSim side
  # (settings.json). When non-empty, the bridge polls each name with
  # getLidarData() per step and stashes the (N, 3) ENU point cloud at
  # state.extra["lidar_points"][name]. Downstream rasterization /
  # fusion is the consumer's job — this bridge stays perception-agnostic.
  # lidars: [FrontLidar]
  #
  # cameras: list of {name, image_type} entries. The bridge calls
  # simGetImages() per step and stashes compressed PNG bytes at
  # state.extra["camera_images"][name]. image_type is one of
  # scene (default), depth_vis, depth_perspective, depth_planar,
  # segmentation, surface_normals, infrared. Combine with
  # `output.save_camera_frames: true` and `uav-nav video <run_dir>`
  # to produce a per-episode mp4 from sim frames.
  # cameras:
  #   - {name: front_center, image_type: scene}
  #   - {name: front_center, image_type: depth_vis}
  #
  # depths: list of {name, image_type, fov_deg, width, height}. The bridge
  # calls simGetImages() with pixels_as_float=True and surfaces a raw
  # float depth image + intrinsics at state.extra["depth_images"][name].
  # image_type is one of depth_planar (default — true Z) or
  # depth_perspective (slant range). Pair with the depth_image_occupancy
  # sensor below to project pixels into the planner's occupancy grid:
  #   sensor: { type: depth_image_occupancy, resolution: 1.0,
  #             stride: 4, max_depth: 8.0 }
  # depths:
  #   - {name: front_center, image_type: depth_planar, fov_deg: 90.0, width: 256, height: 144}

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.2
  horizon: 20
  dt_plan: 0.05
  n_samples: 16
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/airsim_baseline
  # Save per-step camera frames to <run_dir>/frames_NNN/. Combined with
  # the cameras: ... block above, then `uav-nav video <run_dir>` ffmpegs
  # them into per-camera mp4s.
  # save_camera_frames: true

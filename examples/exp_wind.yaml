# Constant-wind disturbance + wind-aware MPC.
#
# Validated 4×4 wind miscalibration sweep — sim wind × planner wind belief
# (n=15 episodes, Wilson 95 % CIs, success rate %; planner uses Pareto
# horizon=20, n_samples=16):
#
#                       planner.wind  (m/s northward)
#                          0      3      6      9
#     sim wind 0:        93.3   60.0   33.3   20.0
#              3:        66.7  100.0   53.3   33.3
#              6:        20.0   66.7   93.3   66.7
#              9:         0.0    0.0    0.0    0.0
#
# Findings:
#  - **Calibration wins.** The diagonal (sim wind = planner belief) hits
#    93-100 % in every solvable cell. Mismatch in either direction hurts:
#      under-correction (planner < sim): drone gets blown sideways
#      over-correction (planner > sim): drone pre-compensates into nothing
#    Both fail symmetrically — the cost is "wrongness", not direction.
#  - **Wind awareness compounds with margin**. At sim=6, no-awareness drops
#    to 20 % (drone routes into obstacles trying to fight the wind);
#    matched belief recovers to 93 %, a +73 pp lift. This is one of the
#    largest single-knob wins in the framework.
#  - **Awareness cannot beat physics**. At sim=9, max_speed=8 means the
#    drone literally cannot make eastward headway against a 9 m/s
#    northward wind because the planner spends all its velocity budget
#    on cancellation. Every cell in that row is 0 %, regardless of
#    belief. Hard kinematic limit; awareness does not help.
#  - **Consistent miscalibration penalty**. Off-diagonal cells degrade
#    monotonically with |sim − planner|: 1-step off costs ~25-30 pp,
#    2 steps off costs ~50-60 pp. Useful sanity check that the rollout
#    cost gradient is well-calibrated.
#
# Reproduce with:
#   uav-nav sweep examples/exp_wind.yaml \
#     --param planner.horizon=20 --param planner.n_samples=16 \
#     --param simulator.disturbance.wind=[0,0],[0,3],[0,6],[0,9] \
#     --param planner.wind=[0,0],[0,3],[0,6],[0,9] \
#     --param num_episodes=15 -j 4
name: wind_baseline
seed: 42
num_episodes: 5

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 25.0]      # straight east — wind will sideslip a y-blowing drone
  resolution: 1.0
  obstacles:
    type: random
    count: 30
    seed: 7

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4
  disturbance:
    wind: [0.0, 3.0]      # 3 m/s northward wind
    gust_std: 0.5

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.3
  horizon: 60
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  wind: [0.0, 0.0]        # default: planner does not know about wind
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/wind_baseline

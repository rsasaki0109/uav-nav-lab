# 3D MPPI cross-dimension validation. Same scenario as
# exp_3d_predictive.yaml (voxel_world 40×40×12, 3 bouncing dynamic
# obstacles, 60 static obstacles, perfect sensor) at the validated 3D
# Pareto config (n_samples=8, horizon=20). Sweeps `temperature` to
# locate the 3D MPPI sweet spot.
#
# Hypothesis (refuted): temperature optimum may flip in 3D the way
# n_samples preference flips (2D wants n=16, 3D wants n=8 — see
# findings.md "3D Pareto: n_samples preference flips"). The 3D
# escape volume is inherently more multi-modal, so a different
# temperature might be optimal.
#
# Result (Wilson 95 % CI; T=0.1, T=1.0 at n=30; T=10, T=100 at n=12
# since they are clearly catastrophic and don't need precision):
#
#  temperature   2D succ    3D succ           2D |Δcmd|    3D |Δcmd|
#  0.1 (≈argmin) 96.7 %     80.0 [66, 89]     0.32         0.087  ← 3D smoothest
#  1.0           100  %     86.7 [71, 95]     0.29         0.213  ← 3D nominal best
#  10  (smooth)  86.7 %     66.7 (n=12)       0.22 ← 2D    0.180
#                                              smoothest
#  100 (uniform)  0.0 %     16.7 (n=12)       n/a          0.106
#
# Three findings:
#
# 1) **No temperature optimum flip — the 2D default transfers.** T=1.0
#    is nominally best in both, although the 3D Pareto landscape is
#    *broader*: T=0.1 and T=1.0 are not statistically distinguishable
#    in 3D (Wilson CIs [66, 89] vs [71, 95] overlap). Useful range
#    extends from T=0.1 to T=1.0 in 3D vs a tighter peak in 2D.
#
# 2) **The smoothness-temperature relationship inverts in 3D.** In 2D
#    higher temperature → smoother control: T=10 had |Δcmd|=0.22, the
#    lowest of any 2D MPPI cell. In 3D the *opposite* — T=0.1 has
#    |Δcmd|=0.087 (60 % lower than T=1.0's 0.213) and T=10 climbs back
#    to 0.180. The 3D cost landscape has more local optima (escape
#    in 5+ directions per voxel), so weighted averaging across modes
#    ADDS command jitter rather than removing it. The Fibonacci-sphere
#    sampling is already robust enough that argmin doesn't jitter.
#
# 3) **Best 3D MPPI (86.7 %) does not beat best 3D MPC (88 % at the
#    same Pareto config).** Same Pareto-saturation lesson as 2D and
#    the mpc_chomp thread: switching planner family doesn't break a
#    tuned MPC baseline, regardless of dimensionality.
#
# Engineering takeaway: temperature in MPPI is *broadly tunable* in
# 3D and the 2D default (T=1.0) is the right starting point. But the
# smoothness/temperature curve has a different shape per dimension —
# always re-tune temperature for the smoothness axis specifically if
# that's the metric you care about, since the 2D pattern (more
# averaging = smoother) inverts.
#
# Reproduce: uav-nav sweep examples/exp_compare_mppi_3d.yaml \
#              --param planner.temperature=0.1,1.0 \
#              --param num_episodes=30 -j 2
# Quick screen: uav-nav sweep examples/exp_compare_mppi_3d.yaml \
#              --param planner.temperature=0.1,1.0,10.0,100.0 \
#              --param num_episodes=12 -j 4
name: cmp_mppi_3d
seed: 42
num_episodes: 12

scenario:
  type: voxel_world
  size: [40, 40, 12]
  start: [2.0, 2.0, 6.0]
  goal: [37.0, 37.0, 6.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 60
    seed: 7
  dynamic_obstacles:
    - start: [20.0, 8.0, 6.0]
      velocity: [0.0, 5.0, 0.5]
      reflect: true
      radius: 0.8
    - start: [8.0, 25.0, 5.0]
      velocity: [4.0, 0.0, -0.4]
      reflect: true
      radius: 0.8
    - start: [28.0, 20.0, 7.0]
      velocity: [-3.0, 2.0, 0.3]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mppi
  max_speed: 8.0
  replan_period: 0.2
  # 3D Pareto config (see exp_3d_predictive.yaml header).
  horizon: 20
  dt_plan: 0.05
  n_samples: 8
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  temperature: 1.0  # 2D sweet spot — does it transfer?

sensor:
  type: perfect

output:
  dir: results/cmp_mppi_3d

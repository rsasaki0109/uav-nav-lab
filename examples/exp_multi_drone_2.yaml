# 2-drone head-on crossing in the same 60×60 world / config used by the
# 3- and 4-drone variants, so the N-drone scaling sweep compares
# apples-to-apples (only the drone count changes).
#
# Validated N-drone scaling (n=30 episodes, joint metrics with Wilson 95% CI):
#
#   N    joint succ          joint coll       per-drone succ
#   2    96.7% [83.3, 99.4]   3.3%             98.3%
#   3    70.0% [52.1, 83.3]  30.0%             87.8%
#   4    73.3% [55.6, 85.8]  26.7%             87.5%
#
# Compare to a naïve independence model (joint = per_drone ^ N):
#   N=2: actual 96.7% = expected 96.7%   Δ =  0.0 pp
#   N=3: actual 70.0% > expected 67.6%   Δ = +2.4 pp
#   N=4: actual 73.3% > expected 58.6%   Δ = +14.7 pp
#
# Two findings worth surfacing:
#  - Joint success drops sharply from N=2 to N=3 (-27 pp). The cross /
#    star geometry creates a single shared conflict zone at the world
#    center; one drone collision typically takes a peer with it.
#  - The MPC's constant-velocity peer prediction *correlates failures
#    in the right direction*: actual joint success at N=4 is +15 pp
#    above the independence model. The same prediction that lets two
#    drones detour around each other also lets four drones — when one
#    yields, the others see the new trajectory and react. With a naïve
#    no-prediction stack the joint rate would track the independence
#    model (or worse). This is the same effect that the
#    use_prediction true vs false ablation made visible at N=2.
#
# Reproduce all three at once with:
#   for n in 2 3 4; do
#     uav-nav run examples/exp_multi_drone_${n}.yaml \
#       --output-dir results/multi_${n}
#     uav-nav eval results/multi_${n}
#   done
name: multi_drone_2
seed: 42
num_episodes: 30

scenario:
  type: multi_drone_grid
  size: [60, 60]
  resolution: 1.0
  obstacles:
    type: random
    count: 30
    seed: 7
  drones:
    - name: east
      start: [3.0, 30.0]
      goal:  [55.0, 30.0]
      radius: 0.4
    - name: west
      start: [55.0, 30.0]
      goal:  [3.0, 30.0]
      radius: 0.4

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 7.0
  replan_period: 0.2
  horizon: 60
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.6
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/multi_drone_2

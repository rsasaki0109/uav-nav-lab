# dummy_3d sensor-latency cliff — small-grid verification.
# 30×30×2 grid, ~30 obstacles at z=1, diagonal crossing.
#
# Sweep:
#   uav-nav sweep examples/exp_dummy_latency.yaml #     --param sensor.delay=0.0,0.05,0.1,0.15,0.2,0.25,0.3 #     --param sensor.extrapolate=false,true #     --param num_episodes=10

name: dummy_latency

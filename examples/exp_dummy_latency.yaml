output: {dir: results/dummy_latency}
planner: {dt_plan: 0.05, goal_radius: 1.5, horizon: 20, inflate: 1, max_speed: 5.0,
  n_samples: 16, replan_period: 0.2, resolution: 1.0, safety_margin: 0.5, type: mpc,
  use_prediction: false, w_goal: 1.0, w_obs: 100.0, w_smooth: 0.05}

# Straight-line baseline — same scenario as basic, no obstacle avoidance.
# Useful as a control to isolate planner contribution vs scene difficulty.
name: basic_straight
seed: 42
num_episodes: 5

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 60
    seed: 7

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: straight
  max_speed: 20.0
  replan_period: 0.5

sensor:
  type: delayed
  delay: 0.1
  position_noise_std: 0.2

output:
  dir: results/basic_straight

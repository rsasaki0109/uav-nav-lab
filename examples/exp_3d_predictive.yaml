# 3D analogue of exp_predictive.yaml — voxel_world with three bouncing
# dynamic obstacles + perfect sensor + Pareto MPC. Validates whether the
# 2D Pareto / cliff findings transfer to 3D.
#
# Validated 3D Pareto sweep — n_samples × horizon (n=8 episodes per cell,
# Wilson 95 % half-widths ≈ ±17 pp, success rate %):
#
#     n_samp\horizon     20    40    60    80   120
#              8        88    75    75    38    38
#             16        75    88    62    38    38
#             32        75    75    88    75    38
#             64        88    75    62    50    38
#            128        75   100    88    62    62
#
#   planner_dt mean (ms):
#     n_samp\horizon     20    40    60    80   120
#              8         70    77    87   103   143
#             16         91    87   105   129   160
#             32        104   114   144   175   240
#             64        109   168   223   278   405
#            128        264   273   372   471   747
#
# Findings vs the 2D analogue:
#  - **The 2D "longer rollouts hurt" effect partly transfers**. 2D drops
#    monotonically with horizon (100 → 35 % across h=20 → 120). 3D drops
#    more gently (most rows stay 75 → 38 %), but the trend is the same:
#    long horizons fall victim to the reach-goal-bonus over-shoot artifact.
#    The 3D escape volume softens but does not eliminate the effect.
#  - **The Pareto frontier shifts to lower n_samples in 3D**. The 2D
#    Pareto-optimal point (n=16, h=20 → 100 % / 51 ms in 2D) lands at
#    only 75 % / 91 ms in 3D. The strongest 3D cells in this sweep are
#    n=8, h=20 (88 % / 70 ms) and n=128, h=40 (100 % / 273 ms).
#    Fibonacci-sphere sampling already covers the 3D escape directions
#    densely enough that fewer per-step samples suffice — the compute
#    is then better spent on horizon depth, opposite of 2D's preference.
#  - **plan_dt is now well-behaved post-cache** (70-750 ms). Pre-cache
#    every cell sat at 1.3-2.2 s; the static cost-to-go cache (added in
#    SamplingMPCPlanner) brought 3D plan_dt back to the same order of
#    magnitude as 2D, making this sweep — and follow-up cliff sweeps —
#    actually tractable.
#
# Honest caveat: at n=8 Wilson 95 % half-widths are ±17 pp on individual
# cells, so cell-by-cell comparisons (e.g. is n=128/h=40 truly the only
# 100 %?) are not significant. *Row trends* (horizon → 80, 120 hurts) and
# the plan_dt scaling are robust.
#
# Methodological transfer: re-validate Pareto in every dimensionality.
# A planner config that is Pareto-optimal in 2D is *not* automatically
# optimal in 3D — n_samples preference flips, and the compute envelope
# can blow through replan_period entirely if the cost-to-go heuristic
# is not cached.
#
# Reproduce with:
#   uav-nav sweep examples/exp_3d_predictive.yaml \
#     --param planner.n_samples=8,16,32,64,128 \
#     --param planner.horizon=20,40,60,80,120 \
#     --param num_episodes=8 -j 4
#
name: predictive_mpc_3d
seed: 42
num_episodes: 5

scenario:
  type: voxel_world
  size: [40, 40, 12]
  start: [2.0, 2.0, 6.0]
  goal: [37.0, 37.0, 6.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 60
    seed: 7
  dynamic_obstacles:
    - start: [20.0, 8.0, 6.0]
      velocity: [0.0, 5.0, 0.5]    # crosses the diagonal corridor + small vertical drift
      reflect: true
      radius: 0.8
    - start: [8.0, 25.0, 5.0]
      velocity: [4.0, 0.0, -0.4]
      reflect: true
      radius: 0.8
    - start: [28.0, 20.0, 7.0]
      velocity: [-3.0, 2.0, 0.3]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 8           # Pareto-optimal in 3D
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/predictive_mpc_3d

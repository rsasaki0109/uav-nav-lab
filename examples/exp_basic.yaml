# Basic experiment: A* over a 50x50 grid with random obstacles.
name: basic_astar
seed: 42
num_episodes: 5

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 40
    seed: 7

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: astar
  max_speed: 10.0       # m/s — set higher (e.g. 20+) to study high-speed failure modes
  replan_period: 0.5
  resolution: 1.0
  inflate: 1            # cells of obstacle dilation for safety margin

sensor:
  type: delayed
  delay: 0.05           # 50ms latency; bump to 0.1+ to study perception lag
  position_noise_std: 0.2

output:
  dir: results/basic_astar

# 3D RRT head-to-head — same scenario as exp_3d_compare_chomp{,_rrt}.yaml.
# Plain RRT is the comparison point against CHOMP+RRT (smoothing on top
# of sampling), to measure how much smoothing buys vs sampling alone.
# In 2D, CHOMP+RRT-init beat plain RRT by +17 pp at cheaper compute.
#
# Reproduce: uav-nav run examples/exp_3d_compare_rrt.yaml
#            uav-nav eval results/cmp_3d_rrt
name: cmp_3d_rrt
seed: 42
num_episodes: 30

scenario:
  type: voxel_world
  size: [40, 40, 12]
  start: [2.0, 2.0, 6.0]
  goal: [37.0, 37.0, 6.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 60
    seed: 7
  dynamic_obstacles:
    - start: [20.0, 8.0, 6.0]
      velocity: [0.0, 5.0, 0.5]
      reflect: true
      radius: 0.8
    - start: [8.0, 25.0, 5.0]
      velocity: [4.0, 0.0, -0.4]
      reflect: true
      radius: 0.8
    - start: [28.0, 20.0, 7.0]
      velocity: [-3.0, 2.0, 0.3]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: rrt
  max_speed: 8.0
  replan_period: 0.5
  step_size: 2.0
  goal_tolerance: 1.5
  goal_bias: 0.1
  max_samples: 1500
  resolution: 1.0
  inflate: 1
  seed: 42

sensor:
  type: perfect

output:
  dir: results/cmp_3d_rrt

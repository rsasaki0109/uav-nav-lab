# 3D multi-drone N=4 dense (120 obstacles) with peer prediction OFF.
# Companion to exp_multi_drone_3d_4_dense.yaml: same world, same drones,
# same MPC weights — only `use_prediction: false`, so each drone treats
# its peers as if they didn't exist (no CV forecasting in the rollout).
#
# Goal: in the regime where coordination Δ has come back (PR #41 showed
# +8.0 pp at 120 obstacles), measure what the CV peer prediction itself
# is buying. If joint success drops sharply at fixed per-drone success,
# the prediction is doing real coordination work; if it barely moves,
# success was driven by static-map planning alone and the obstacles
# happened to also de-conflict the drones.
#
# Result (n=30):
#   per-drone success: 16.7 % [11.1, 24.3]   (dense w/ pred: 65.8 %)
#   joint success:      6.7 % [1.8, 21.3]    (dense w/ pred: 26.7 %)
#   indep `per^4`:      0.08 %
#   Δ over indep:      +6.6 pp                (dense w/ pred: +8.0 pp)
#
# Removing peer prediction collapses per-drone success (-49.1 pp) — the
# crossing pairs now run head-on through each other instead of arcing
# around. Joint also drops (-20.0 pp). Δ over indep stays positive
# only because per-drone fell so far that `per^4` is now ~0; the
# absolute joint number is the meaningful one and it's down 4× from
# the predicting baseline. See docs/findings.md "3D peer-prediction
# ablation: prediction is doing 4× more work than density geometry".
#
# Reproduce:
#   uav-nav run examples/exp_multi_drone_3d_4_dense_indep.yaml
#   uav-nav eval results/multi_drone_3d_4_dense_indep

name: multi_drone_3d_4_dense_indep
seed: 42
num_episodes: 30

scenario:
  type: multi_drone_voxel
  size: [40, 40, 12]
  resolution: 1.0
  obstacles:
    type: random
    count: 120                 # match dense baseline
    seed: 7
  drones:
    - name: east
      start: [3.0, 20.0, 6.0]
      goal:  [37.0, 20.0, 6.0]
      radius: 0.4
    - name: west
      start: [37.0, 20.0, 6.0]
      goal:  [3.0, 20.0, 6.0]
      radius: 0.4
    - name: north
      start: [20.0, 3.0, 6.0]
      goal:  [20.0, 37.0, 6.0]
      radius: 0.4
    - name: south
      start: [20.0, 37.0, 6.0]
      goal:  [20.0, 3.0, 6.0]
      radius: 0.4

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 8
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: false        # <-- only difference from _dense.yaml
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/multi_drone_3d_4_dense_indep

# MPC + CHOMP smoothing — velocity-profile output mode.
#
# Companion to exp_compare_mpc_chomp.yaml. That YAML's `output: waypoints`
# mode (pure-pursuit on the smoothed path) landed +90 % |Δcmd| vs plain
# MPC because pure-pursuit re-aims every control step. Its header
# concluded "the smoothing payoff would need a velocity-profile-aware
# follower" — this YAML tests exactly that hypothesis with new
# infrastructure (Plan.velocity_profile + runner velocity-tracking mode).
#
# Mechanism: smooth MPC's rollout with CHOMP, derive per-step velocities
# from the smoothed path (forward differences / dt_plan), emit them as a
# time-indexed `velocity_profile`. The runner picks the bin matching
# elapsed-since-replan time. No pure-pursuit, no constant-velocity bypass
# — the controller follows the smoothed velocity directly.
#
# Measured (50×50, n=30 episodes, dynamic obstacles, Wilson 95 % CI):
#   plain MPC               96.7 % [83, 99]   plan_dt 11.0 ms   |Δcmd| 0.32
#   mpc+chomp (waypoints)   96.7 % [83, 99]   plan_dt 18.9 ms   |Δcmd| 0.61
#   mpc+chomp (vprofile)    90.0 % [74, 96]   plan_dt 21.3 ms   |Δcmd| **2.02**
#                                                                       ← this
#
# Honest null result, *strengthened*. The proposed architectural fix is
# worse on every axis: success drops 6.7 pp, plan_dt is the highest of
# the three, and per-step |Δcmd| is **6.3× plain MPC**. Two effects
# compound:
#   1. Profile entry changes every control step (vs constant for one
#      replan_period in plain MPC). Even smooth-by-construction velocities
#      from the CHOMP-smoothed path differ across consecutive samples,
#      so |Δcmd| is bounded below by the path curvature.
#   2. Replan-boundary discontinuities. Each replan re-runs CHOMP on a
#      new initial position; the first velocity of the new profile is
#      derived from a freshly-smoothed path, jumping vs the last applied
#      velocity of the previous profile. plain MPC has a similar boundary
#      but only moves by `w_smooth · |Δaction|` (penalised in scoring),
#      while the profile derivative is unconstrained.
#
# Compounded conclusion: at this Pareto-saturated MPC config, *neither*
# layering strategy improves smoothness. The constant-velocity bypass
# isn't a bug — it's the ceiling. Helping would need either
#   (a) a planner that emits a smoothness-of-velocity-profile-aware
#       trajectory (e.g. CHOMP on the velocity sequence directly), or
#   (b) replan-boundary smoothing (penalise jump from previous applied
#       velocity in the cost), neither of which is just "add a smoother".
#
# Reproduce: uav-nav run examples/exp_compare_mpc_chomp_vprofile.yaml
#            uav-nav eval results/cmp_mpc_chomp_vprofile
name: cmp_mpc_chomp_vprofile
seed: 42
num_episodes: 30

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 25
    seed: 7
  dynamic_obstacles:
    - start: [25.0, 10.0]
      velocity: [0.0, 6.0]
      reflect: true
      radius: 0.8
    - start: [10.0, 30.0]
      velocity: [5.0, 0.0]
      reflect: true
      radius: 0.8
    - start: [35.0, 25.0]
      velocity: [-4.0, 3.0]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc_chomp
  max_speed: 10.0
  replan_period: 0.2
  n_smooth_iters: 15
  learning_rate: 0.05
  max_step_norm: 1.0
  w_smooth: 1.0
  w_obs: 5.0
  epsilon: 2.0
  smooth_resolution: 1.0
  smooth_inflate: 1
  # The whole point of this YAML — emit a velocity profile, not waypoints.
  output: velocity_profile
  mpc:
    max_speed: 10.0
    horizon: 20
    dt_plan: 0.05
    n_samples: 16
    resolution: 1.0
    inflate: 1
    goal_radius: 1.5
    safety_margin: 0.5
    use_prediction: true
    w_goal: 1.0
    w_obs: 100.0
    w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/cmp_mpc_chomp_vprofile

# CHOMP with RRT-init — same scenario as exp_compare_chomp.yaml, but the
# trajectory is initialised from an RRT path (resampled to n_waypoints)
# rather than the straight line. The smoothness optimisation then has a
# collision-free starting point on cluttered scenarios; CHOMP becomes
# "smoothing on top of sampling" rather than purely local refinement.
#
# Pairs with exp_compare_chomp.yaml — the question this YAML answers is
# "does adding the RRT init lift CHOMP above plain RRT, since the
# downstream smoothing should produce shorter, less-zigzag paths from
# the same probabilistic-completeness guarantee?"
#
# Measured (50×50, n=30 episodes, dynamic obstacles, Wilson 95 % CI):
#   chomp        53.3 %  [36.1, 69.8]   plan_dt 21.31 / 22.31 ms
#   chomp+rrt    90.0 %  [74.4, 96.5]   plan_dt 32.20 / 48.63 ms   ← this file
#   rrt          73.3 %  [55.5, 85.8]   plan_dt 29.99 / 64.27 ms
#   mpc         100.0 %  [88.6, 100.0]  plan_dt 52.16 / 56.96 ms
# Yes — RRT init lifts success +37 pp at +50 % compute (still cheaper
# than MPC), and the smoothing produces tighter paths than plain RRT
# (path length 69.4 ± 5.6 m vs RRT's typical zigzag). The interesting
# part is that this is a *strict* layering win: RRT alone gives the
# probabilistic completeness, CHOMP alone gives the smoothness, and
# stacking them gets both. Same Pareto-saturation lesson the rest of
# the table teaches — adding a layer only wins if it stays inside the
# replan budget.
#
# Reproduce: uav-nav run examples/exp_compare_chomp_rrt.yaml
#            uav-nav eval results/cmp_chomp_rrt
name: cmp_chomp_rrt
seed: 42
num_episodes: 30

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 25
    seed: 7
  dynamic_obstacles:
    - start: [25.0, 10.0]
      velocity: [0.0, 6.0]
      reflect: true
      radius: 0.8
    - start: [10.0, 30.0]
      velocity: [5.0, 0.0]
      reflect: true
      radius: 0.8
    - start: [35.0, 25.0]
      velocity: [-4.0, 3.0]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: chomp
  max_speed: 10.0
  replan_period: 0.2
  n_waypoints: 30
  n_iters: 100
  learning_rate: 0.05
  max_step_norm: 1.0
  w_smooth: 1.0
  w_obs: 5.0
  epsilon: 2.0
  resolution: 1.0
  inflate: 1
  goal_tolerance: 1.5
  # RRT init params — the inner RRT planner runs once per replan to
  # produce a feasible warm-start for the CHOMP smoothing pass.
  init: rrt
  rrt_max_samples: 1000
  rrt_step_size: 2.0
  rrt_goal_tolerance: 1.5
  rrt_goal_bias: 0.1
  rrt_seed: 42

sensor:
  type: perfect

output:
  dir: results/cmp_chomp_rrt

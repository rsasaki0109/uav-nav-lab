# Predictive MPC under dynamic obstacles, with a perfect sensor so the
# planner gets full ground-truth velocities. Toggle `use_prediction` to
# isolate the effect of constant-velocity prediction in MPC.
#
# Validated 2D ablation — replan_period × max_speed (n=20, success rate %):
#
#     speed\period   0.10   0.20   0.50   1.00   2.00
#         10 m/s     70     70     70     70     95
#         15 m/s     45     50     40     35     55
#         20 m/s     35     30     30     25     35
#         25 m/s      0      0      0      0      0
#         30 m/s      0      0      0      0      0
#
# Two findings worth reporting:
#  - max_speed is the dominant factor; beyond ~20 m/s the MPC config in
#    this YAML hits a dynamic-feasibility cliff (collision rate → 100%
#    independent of replan_period). Tighter safety_margin / inflate or
#    a higher max_accel is needed to push the cliff out.
#  - replan_period within 0.1–1.0 s barely moves success at any fixed
#    speed (Δ ≤ 10pp). Replanning more than ~5 Hz here yields little
#    safety gain — interesting for compute-budget studies.
#
# Reproduce with:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param planner.max_speed=10,15,20,25,30 \
#     --param planner.replan_period=0.1,0.2,0.5,1.0,2.0 \
#     --param num_episodes=20 -j 4
#   uav-nav viz <out>     # renders the 2D heatmap
#
# 2D Pareto: n_samples × horizon (n=20, success rate %):
#
#     n_samp\horizon    20    40    60    80   120
#              8       100    90    80    65    45
#             16       100    85    80    65    35
#             32       100    95    75    60    35  ← current default
#             64       100   100    75    60    45
#            128       100   100    95    80    40
#
# planner_dt mean (ms):
#     n_samp\horizon    20    40    60    80   120
#              8        55    53    60    64    73
#             16        51    61    68    76    95
#             32        58    74    98   126   162
#             64        82   124   192   220   313
#            128       147   217   306   385   560
#
# Sole Pareto-optimal point: n_samples=16, horizon=20 → 100% / 51 ms.
# Dominates the existing default (32 / 60 → 75% / 98 ms): higher
# success at half the compute. Counterintuitive horizon trend — longer
# rollouts here *hurt* success because the reach-goal bonus fires less
# often when the rollout overshoots the goal radius mid-trajectory.
#
# Reproduce with:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param planner.n_samples=8,16,32,64,128 \
#     --param planner.horizon=20,40,60,80,120 \
#     --param num_episodes=20 -j 4
#
# 2D ablation: sensor.delay × max_speed with the delayed sensor swapped
# in for the perfect one (n=20, success rate %):
#
#     delay\speed     10    15    20    25    30
#       0.00 s       70    50    30     0     0
#       0.05 s       70    50    30     0     0
#       0.10 s       65    30    30     0     0
#       0.20 s       55    15    25     0     0
#       0.50 s       20    15    25     0     0
#
# Compare to the same sweep on exp_basic.yaml (A*, static obstacles)
# which tolerated up to 0.2 s of delay cleanly: predictive MPC under
# *dynamic* obstacles is much more delay-sensitive — at speed=15
# success collapses from 50% → 15% just going from 0 → 0.2 s.
# Stale ego-pose belief is fed to a constant-velocity peer-prediction,
# so the predicted obstacle trajectory is wrong from a wrong starting
# point; the safety margin cannot absorb a moving target the way it
# absorbs a static one.
#
# Reproduce with:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param sensor.type=delayed \
#     --param sensor.delay=0.0,0.05,0.1,0.2,0.5 \
#     --param planner.max_speed=10,15,20,25,30 \
#     --param num_episodes=20 -j 4
#
# Recovery sweep at the worst-tolerated cell (delay=0.2 s, speed=15
# m/s, where the previous heatmap reads 15% success): does widening
# the safety margins absorb the perception lag for moving threats?
#
#   success rate (%):
#     inflate\safety_margin   0.5   1.0   1.5   2.0   3.0
#                       1      15    15    10    10    20
#                       2      20    30    30    35    20
#                       3      50    25    25    20    20
#                       4      30    35    10    10    45
#                       5      20    20    35    45    55  ← best
#
# Partial recovery only: 15% → 55% (Δ=40pp) at the most aggressive
# margin tested. The signal is bumpy at n=20 (Wilson half-widths
# ≈15–20pp, so individual pair comparisons aren't significant), but
# the row trend (inflate=5 the only consistent improvement) is
# robust. **No corner recovers to the static-obstacle baseline of
# ~100%** — perception lag fundamentally limits the dynamic-obstacle
# case in a way that static A* does not suffer from. Engineering
# implication: pad more, but expect diminishing returns; tighter
# perception latency is the lever to keep pulling.
#
# Reproduce with:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param sensor.type=delayed --param sensor.delay=0.2 \
#     --param planner.max_speed=15 \
#     --param planner.inflate=1,2,3,4,5 \
#     --param planner.safety_margin=0.5,1.0,1.5,2.0,3.0 \
#     --param num_episodes=20 -j 4
#
# === IMPORTANT: re-validation at the Pareto-optimal MPC config ===
#
# The four ablations above use this YAML's existing defaults
# (n_samples=32, horizon=60), which the n_samples × horizon Pareto
# sweep showed to be suboptimal. Re-running the two big heatmaps at
# the validated optimum (n_samples=16, horizon=20) materially
# rewrites the conclusions:
#
#   replan_period × max_speed (success rate %, Pareto config):
#     speed\period    0.1    0.2    0.5    1.0    2.0
#         10         100    100     90     95     10
#         15         100     90     90     55     30
#         20          85     75     60     35     25
#         25          55     55     35     15      0
#         30          65     45     50      5      0
#
#   sensor.delay × max_speed (success rate %, Pareto + delayed sensor):
#     delay\speed     10     15     20     25     30
#       0.00         100     90     75     55     45
#       0.05         100     90     75     55     45
#       0.10          95     80     45     35     40
#       0.20          85     80     45     60     55
#       0.50          25     25     10     20     20
#
# What changes vs. the suboptimal-default tables above:
#  - The "dynamic-feasibility cliff at 25 m/s" (0% across the row in
#    the prior heatmap) was a horizon=60 artifact. With horizon=20
#    success at speed=25/30 jumps to 35–65% at short replan periods.
#  - replan_period now matters clearly. At fixed speed, going from
#    0.1 → 2.0 s drops success by 40–70 pp (vs ≤10 pp before). The
#    earlier "replan period barely affects success" was partly a
#    CPU-saturation artifact: at horizon=60 every replan took ~200
#    ms, so even replan_period=0.1 s could not actually keep up.
#  - delay tolerance is dramatically better: speed=15 / delay=0.2 s
#    jumps from 15% → 80% (+65 pp); the entire delay-≤0.2 s band
#    sits ≥ 45% across all speeds. The delay=0.5 s cliff persists
#    in both configs (≤ 25%) — once delay exceeds horizon × dt_plan
#    (= 1.0 s) the rollout's prediction is fundamentally broken.
#
# Methodological lesson: always validate ablation conclusions at
# the Pareto-optimal config of the planner. Suboptimal MPC settings
# can mask both ceilings (max feasible speed) and sensitivities
# (replan-period effect, delay tolerance).
#
# Reproduce both with:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param planner.horizon=20 --param planner.n_samples=16 \
#     --param planner.max_speed=10,15,20,25,30 \
#     --param planner.replan_period=0.1,0.2,0.5,1.0,2.0 \
#     --param num_episodes=20 -j 4
#
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param planner.horizon=20 --param planner.n_samples=16 \
#     --param sensor.type=delayed \
#     --param sensor.delay=0.0,0.05,0.1,0.2,0.5 \
#     --param planner.max_speed=10,15,20,25,30 \
#     --param num_episodes=20 -j 4
#
# Margin recovery at the persistent delay=0.5 s cliff (Pareto config,
# speed=15 m/s; n=20 per cell, success rate %):
#
#     inflate\safety_margin   0.5   1.0   1.5   2.0   3.0
#                       1      25    15    15    35    30
#                       2      15    20    15    25    20
#                       3      25    15    30    25    20
#                       4      15    20    15    10    25
#                       5      10    15    15    20     5
#
# **Margin tuning cannot save the cliff** — best cell is 35% (only
# +10 pp above the no-tuning baseline of 25%, well within the n=20
# noise band). The mechanism is geometric:
#   delay × max_speed = 0.5 s × 15 m/s = 7.5 m of pose-belief error
# Effective danger zone around an obstacle is at most
#   drone_radius + safety_margin + obstacle_radius ≈ 0.4 + 3.0 + 0.5
#   = 3.9 m
# Belief error (7.5 m) exceeds the danger zone (3.9 m); no
# fixed-margin shield can absorb that. Note also that aggressive
# `inflate` (≥4 cells, nearly the obstacle radius itself) starts
# filling the world — the planner cannot find a path and success
# trends downward.
#
# Engineering rule: when sensor delay × max_speed approaches the
# obstacle/agent danger-zone radius, perception latency must be
# attacked at the source (faster pipeline, learned predictor with
# memory, Kalman-style state extrapolation), not the planner side.
#
# Reproduce with:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param planner.horizon=20 --param planner.n_samples=16 \
#     --param sensor.type=delayed --param sensor.delay=0.5 \
#     --param planner.max_speed=15 \
#     --param planner.inflate=1,2,3,4,5 \
#     --param planner.safety_margin=0.5,1.0,1.5,2.0,3.0 \
#     --param num_episodes=20 -j 4
#
# Predictor ablation at the persistent cliff (Pareto, delay=0.5 s,
# speed=15 m/s; n=30 per cell, success rate %):
#
#   constant_velocity  delay_comp=0.00  →  26.7% [14.2, 44.4]  (baseline)
#   kalman_velocity    delay_comp=0.00  →  26.7% [14.2, 44.4]  (no gain)
#   kalman_velocity    delay_comp=0.25  →  26.7% [14.2, 44.4]
#   kalman_velocity    delay_comp=0.50  →  20.0% [ 9.5, 37.3]  (worse)
#   kalman_velocity    delay_comp=0.75  →  16.7% [ 7.3, 33.6]  (worse)
#
# Negative result, methodologically important. The Kalman tracker
# (position-only measurements, internal velocity estimation) matches
# constant-velocity exactly at delay_comp=0 — the cliff is *not*
# about velocity-estimate quality. Adding `delay_compensation` on
# the predictor side, expected to "project obstacles forward by the
# known sensor lag," actively hurts: the MPC rollout starts from a
# stale ego pose (the same delayed sensor reports both ego and
# obstacle observations), so projecting only the obstacles to
# "now" while the ego model still thinks it is at "now − 0.5 s"
# creates a temporal misalignment. The drone plans against future
# obstacles using a past self.
#
# Engineering corollary: lifting the cliff requires *systemic*
# extrapolation — ego-pose forward projection in the runner, or
# splitting ego and obstacle perception into separately-tunable
# pipelines. Predictor-side tricks alone cannot bridge the
# delay × max_speed > danger_zone gap.
#
# Reproduce with:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param planner.horizon=20 --param planner.n_samples=16 \
#     --param sensor.type=delayed --param sensor.delay=0.5 \
#     --param planner.max_speed=15 \
#     --param planner.predictor.type=constant_velocity,kalman_velocity \
#     --param num_episodes=30 -j 4
#   # and a separate sweep over kalman delay_compensation:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param planner.horizon=20 --param planner.n_samples=16 \
#     --param sensor.type=delayed --param sensor.delay=0.5 \
#     --param planner.max_speed=15 \
#     --param planner.predictor.type=kalman_velocity \
#     --param planner.predictor.delay_compensation=0.0,0.25,0.5,0.75 \
#     --param num_episodes=30 -j 4
#
# Systemic fix attempt: ego-pose forward extrapolation in the
# delayed sensor. With `sensor.extrapolate=true` the sensor projects
# its stale measurement to "now" using a finite-differenced velocity
# (a CV-style onboard estimator). delay × speed heatmap, n=20:
#
#   delay\speed    10    15    20    25    30
#     0.00         95    80    45    35    40   ← worse than no-extrap
#     0.05        100    90    75    55    45   ← Δ=0
#     0.10        100    80    70    50    55   ← Δ=+0..25 pp
#     0.20         95    75    80    55    40   ← Δ=+35 pp at 20 m/s
#     0.50         60    35    40    15     5   ← cliff partially lifted
#
# Honest assessment: partial systemic fix, *not* a silver bullet.
#  - Helps at moderate delay × speed (delay=0.1–0.2 s @ speed=20-30:
#    Δ=+15..35 pp). The runner finally sees a fresh ego pose.
#  - At delay=0 it actively *hurts* (Δ=-5..-30 pp). Buffer length is
#    pinned to ≥1 control step, so even at delay=0 extrap propagates
#    a 1-step-stale measurement forward — introducing a small lag
#    artifact where the no-extrap path would just return the current
#    pose verbatim.
#  - At delay=0.5 × speed=10/20 the cliff lifts (60% / 40% vs prior
#    25% / 10%, Δ=+30..35 pp). At delay=0.5 × speed=25/30 it goes
#    *down* (-5 / -15 pp). The 0.05 s finite-difference becomes
#    velocity-noisy when the drone is accelerating; CV extrapolation
#    overshoots and sends the estimated pose past truth.
#  - At the headline persistent cliff (delay=0.5, speed=15, n=30):
#    26.7% → 33.3% (+6.6 pp, CIs overlap). Not statistically
#    significant on its own — the Δ=+30 pp gains live at slightly
#    different cells.
#
# Engineering takeaway: simple CV-style ego extrapolation closes
# part of the gap that the prior "Predictor + delay_compensation"
# experiment showed could not be closed by predictor tricks alone.
# Closing the rest requires multi-sample velocity smoothing
# (Kalman or moving-average over a longer window) so the velocity
# estimate is less noisy under acceleration. That's the natural
# next predictor / sensor experiment.
#
# Reproduce with:
#   uav-nav sweep examples/exp_predictive.yaml \
#     --param planner.horizon=20 --param planner.n_samples=16 \
#     --param sensor.type=delayed \
#     --param sensor.delay=0.0,0.05,0.1,0.2,0.5 \
#     --param sensor.extrapolate=true \
#     --param planner.max_speed=10,15,20,25,30 \
#     --param num_episodes=20 -j 4
name: predictive_mpc
seed: 42
num_episodes: 5

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 25
    seed: 7
  dynamic_obstacles:
    - start: [25.0, 10.0]
      velocity: [0.0, 6.0]
      reflect: true
      radius: 0.8
    - start: [10.0, 30.0]
      velocity: [5.0, 0.0]
      reflect: true
      radius: 0.8
    - start: [35.0, 25.0]
      velocity: [-4.0, 3.0]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.2
  horizon: 60
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/predictive_mpc

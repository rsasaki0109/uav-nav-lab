# Sim-transferability ablation: airsim half of the comparison.
#
# Pairs with `exp_transfer_dummy.yaml` (identical scenario / planner /
# sensor, only `simulator.type` differs). The drone flies the same
# straight-line MPC path from start → goal at altitude 30 m, above
# the Blocks env's tallest cube clusters, so the AirSim-side world
# geometry doesn't intrude on a comparison that's meant to isolate
# *physics* differences.
#
# What we expect dummy_3d to miss:
#   - SimpleFlight motor ramp-up (velocity command → actual velocity
#     has a first-order lag; dummy_3d only caps by `max_accel`)
#   - Quadrotor pitch-to-translate coupling (the drone tilts to
#     accelerate horizontally, briefly losing altitude / heading)
#   - Air drag at higher speeds
#
# Run:
#   pip install airsim
#   ./AirSim/Blocks/LinuxNoEditor/Blocks.sh -RenderOffscreen \
#       -ResX=720 -ResY=405
#   uav-nav run examples/exp_transfer_airsim.yaml
#   uav-nav eval results/transfer_airsim
#
# Result (n=10): see docs/findings.md "AirSim vs dummy_3d
# transferability".

name: transfer_airsim
seed: 42
num_episodes: 10

scenario:
  type: voxel_world
  size: [60, 60, 40]
  start: [0.0, 0.0, 30.0]
  goal:  [0.0, 30.0, 30.0]
  resolution: 1.0
  obstacles:
    type: none

simulator:
  type: airsim
  host: 127.0.0.1
  port: 41451
  vehicle: Drone1
  dt: 0.05
  max_steps: 400
  goal_radius: 2.0
  settle_after_reset: 1.0
  settle_after_teleport: 0.3

planner:
  type: mpc
  max_speed: 5.0
  replan_period: 0.1
  horizon: 20
  dt_plan: 0.05
  n_samples: 16
  resolution: 1.0
  inflate: 0
  goal_radius: 2.0
  safety_margin: 0.5
  use_prediction: false
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/transfer_airsim

# 3D point-mass + voxel_world + 26-connected A*.
# The same dummy backend handles 2D and 3D — dimension is taken from the
# scenario.  MPC is currently 2D-only; use astar / straight in 3D.
name: basic_3d
seed: 42
num_episodes: 3

scenario:
  type: voxel_world
  size: [30, 30, 10]
  start: [2.0, 2.0, 5.0]
  goal: [27.0, 27.0, 5.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 80
    seed: 11

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: astar
  max_speed: 8.0
  replan_period: 0.5
  resolution: 1.0
  inflate: 1

sensor:
  type: delayed
  delay: 0.05
  position_noise_std: 0.2

output:
  dir: results/basic_3d

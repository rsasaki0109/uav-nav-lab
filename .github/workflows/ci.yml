name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package + test/viz extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,viz]'
      - name: Lint (ruff)
        run: ruff check uav_nav_lab tests
      - name: Run tests
        run: pytest -q

  smoke-cli:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e '.[viz]'
      - name: list planners
        run: uav-nav list
      - name: run an experiment (5 episodes from exp_basic.yaml)
        run: uav-nav run examples/exp_basic.yaml --output-dir results/ci_smoke
      - name: evaluate
        run: uav-nav eval results/ci_smoke
      - name: render trajectory PNG (viz extras)
        run: uav-nav viz results/ci_smoke
